name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *" # Rulează zilnic la miezul nopții
  workflow_dispatch: # Permite rularea manuală

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Fetch Stats Image
        run: |
          curl -o top-langs.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=FlaviusMarian27&layout=compact&theme=dark&langs_count=10&hide=jupyter%20notebook"
          
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add top-langs.svg
          git commit -m "Update top-langs.svg" || exit 0
          git push
